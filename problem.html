<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProGram — Python問題集</title>
  <link rel="stylesheet" href="problem.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ヘッダー -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">Pro<span class="accent">Gram</span></div>
      <nav class="main-nav">
        <a href="index.html" class="nav-link">📚 学習ガイドに戻る</a>
      </nav>
      <button class="hamburger" id="hamburger" aria-label="メニュー">
        <span></span><span></span><span></span>
      </button>
    </div>
    <div class="progress-bar" id="progress-bar"></div>
  </header>

  <!-- モバイルドロワー -->
  <div class="drawer" id="drawer">
    <ul id="drawer-nav-list"></ul>
  </div>
  <div class="drawer-overlay" id="drawer-overlay"></div>

  <!-- ヒーロー -->
  <section class="hero-problem">
    <div class="hero-bg"></div>
    <div class="hero-content">
      <div class="hero-label">Practice Problems</div>
      <h1 class="hero-title">Python <em>問題集</em></h1>
      <p class="hero-desc">
        基礎から応用まで、段階的に学べる実践問題集。<br>
        まずは問題を読んで自分で考え、コードを書いてみましょう。
      </p>
      <div class="difficulty-guide">
        <div class="diff-item">
          <span class="diff-badge easy">入門</span>
          <span class="diff-desc">print文・変数の基礎</span>
        </div>
        <div class="diff-item">
          <span class="diff-badge normal">基礎</span>
          <span class="diff-desc">計算・入出力・条件分岐</span>
        </div>
        <div class="diff-item">
          <span class="diff-badge hard">応用</span>
          <span class="diff-desc">ループ・関数・複合問題</span>
        </div>
      </div>
    </div>
  </section>

  <!-- 問題フィルター -->
  <section class="filter-section">
    <div class="filter-container">
      <div class="filter-label">難易度で絞り込み：</div>
      <div class="filter-buttons">
        <button class="filter-btn active" data-filter="all">すべて</button>
        <button class="filter-btn" data-filter="easy">入門</button>
        <button class="filter-btn" data-filter="normal">基礎</button>
        <button class="filter-btn" data-filter="hard">応用</button>
      </div>
      <div class="stats">
        <span id="solved-count">0</span> / <span id="total-count">0</span> 問完了
      </div>
    </div>
  </section>

  <!-- 問題リスト -->
  <main class="main-content">
    <div class="problems-container" id="problems-container">
      <!-- JavaScriptで動的に生成 -->
    </div>
  </main>

  <!-- フッター -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-logo">Pro<span class="accent">Gram</span></div>
      <p class="footer-copy">Python実践問題集</p>
    </div>
  </footer>

  <script src="problem-script.js"></script>
</body>
</html>
